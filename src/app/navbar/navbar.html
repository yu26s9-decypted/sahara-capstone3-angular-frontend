<header class="sticky top-0 z-50 bg-slate-950 text-white shadow-md">
  <nav class="flex min-h-16 items-center gap-3 px-4">
    <a class="flex h-12 shrink-0 items-center rounded-full px-3 transition hover:bg-white/10" routerLink="/">
      <img class="h-9 w-28 brightness-0 invert" src="/sahara-v2.svg" alt="Sahara">
    </a>

    
    <button class="hidden min-w-36 rounded-full px-4 py-2 text-left leading-tight transition hover:bg-white/10 md:block">
      <span class="block text-xs text-slate-300">Delivering to</span>
      @if(!authService.isAuthenticated()){
        <span class="block text-sm font-bold">Your oasis</span>
      } @else if(profile()?.address && profile()?.state) {
        <span class="block max-w-40 truncate text-sm font-bold">{{ profile()?.address }}, {{ profile()?.state }}</span>
      } @else {
        <span class="block text-sm font-bold">Your oasis</span>
      }
      
    </button>

    <div class="flex h-11 min-w-0 flex-1 items-center overflow-hidden rounded-full bg-white/95 shadow-sm">
      <input class="min-w-0 flex-1 bg-transparent px-5 text-base text-slate-950 outline-none placeholder:text-slate-500" type="search" placeholder="Search Sahara">

      <button class="mr-1 flex h-9 w-11 items-center justify-center rounded-full bg-blue-600 text-xl text-white transition hover:bg-blue-500" type="button" aria-label="Search">
        <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
      </button>
    </div>

    @if(authService.isAuthenticated()){
    <div class="group relative hidden lg:block">
      <button class="rounded-full px-4 py-2 text-left leading-tight transition hover:cursor-pointer hover:bg-white/10"
      type="button"
      aria-label="account menu"
      aria-haspopup="menu"
      >
        <span class="block text-xs text-slate-300">Hello,</span>
        <span class="block text-sm font-bold">{{user()?.firstName}}</span>
      </button>

      <div role="menu" class="invisible absolute right-0 top-full z-50 pt-3 opacity-0 transition group-hover:visible group-hover:opacity-100">
        <div class="w-56 bg-white p-1 text-slate-950 shadow-lg">
          <a class="block px-3 py-2 text-sm font-semibold hover:bg-slate-100" routerLink="/account">Account settings</a>
          <a class="block px-3 py-2 text-sm font-semibold hover:bg-slate-100" href="/">Orders</a>
          <button class="block w-full px-3 py-2 text-left text-sm font-semibold text-red-600 hover:bg-red-50" type="button" (click)="authService.logout()">
            Sign out
          </button>
        </div>
      </div>
    </div>
    } @else {
       <a class="hidden rounded-full px-4 py-2 leading-tight transition hover:bg-white/10 lg:block" routerLink="/sign-in">
      <span class="block text-xs text-slate-300">Hey, sign in</span>
      <span class="block text-sm font-bold">Account</span>
    </a>
    
  }

    <a class="hidden rounded-full px-4 py-2 leading-tight transition hover:bg-white/10 lg:block" href="/">
      <span class="block text-xs text-slate-300">Track & manage</span>
      <span class="block text-sm font-bold">Orders</span>
    </a>

    @if(authService.isAuthenticated()){
      
  <a class="relative flex shrink-0 items-center gap-2 rounded-full px-4 py-2 transition hover:bg-white/10" routerLink="/check-out">
    <span class="relative flex items-center justify-center text-3xl leading-none">
        <i class="ph ph-shopping-cart-simple" aria-hidden="true"></i>
        @if(cartService.cartCount() > 0){
            <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-blue-600 text-[10px] font-bold text-white">
                {{ cartService.cartCount() }}
            </span>
        }
    </span>
    <span class="hidden text-sm font-bold sm:inline">Cart</span>
  </a>
    } @else {
    <a class="flex shrink-0 items-center gap-2 rounded-full px-4 py-2 transition hover:bg-white/10" routerLink="/sign-in">
      <span class="flex items-center justify-center text-3xl leading-none">
        <i class="ph ph-shopping-cart-simple" aria-hidden="true"></i>
      </span>
      <span class="hidden text-sm font-bold sm:inline">Cart</span>
    </a>
  }
  </nav>

</header>
