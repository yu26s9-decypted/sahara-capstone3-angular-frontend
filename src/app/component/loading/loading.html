@if(compact){
    <div class="flex items-center gap-3 text-sm font-semibold text-slate-600" role="status" aria-live="polite">
        <span class="h-4 w-4 animate-spin rounded-full border-2 border-slate-200 border-t-blue-700" aria-hidden="true"></span>
        <span>{{ label }}</span>
    </div>
} @else if(fullViewport) {
    <section class="grid min-h-[calc(100dvh-4rem)] place-items-center px-4 py-8 sm:px-6" role="status" aria-live="polite">
        <div class="flex items-center gap-3 bg-white p-5 text-sm font-semibold text-slate-700">
            <span class="h-5 w-5 animate-spin rounded-full border-2 border-slate-200 border-t-blue-700" aria-hidden="true"></span>
            <span>{{ label }}</span>
        </div>
    </section>
} @else {
    <section class="mx-auto max-w-[92rem] px-4 py-6 sm:px-6" role="status" aria-live="polite">
        <div class="border border-slate-200 bg-white p-5">
            <div class="flex items-center gap-3 text-sm font-semibold text-slate-700">
                <span class="h-5 w-5 animate-spin rounded-full border-2 border-slate-200 border-t-blue-700" aria-hidden="true"></span>
                <span>{{ label }}</span>
            </div>
        </div>
    </section>
}
